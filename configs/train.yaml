defaults:
  - encoder: w2v2_fullft
  - model: baseline
  - graph: fixed_gat
  - loss: ce
  - _self_
  - optional experiment: null

find_unused_parameters: true

num_epochs: 20
max_train_batches: -1
max_val_batches: -1
gradient_accumulation_steps: 2

train_batch_size: 12
val_batch_size: 24
num_workers: 18

learning_rate: 1e-4

projection:
  enabled: false
  hidden_dim: 256
  dim: 128
  dropout: 0.1

export:
  weights_path: /data/home/borodin_sam/another_workspace/AASIST3/weights/train/FINAL/model.safetensors
  repo_id: null

augmentation:
  two_views: false

comet_project_name: "antispoof"
comet_run_name: "check_multigpu"
workspace: "korallll"

checkpoint_base_path: /data/home/borodin_sam/another_workspace/AASIST3/weights/train
resume_from_checkpoint: /data/home/borodin_sam/another_workspace/AASIST3/weights/train/check_multigpu_epoch_5

